name: Taegliche Podcast-Generierung

on:
  schedule:
    - cron: '0 5 * * *'  # Jeden Tag um 07:00 Uhr Wien-Zeit (UTC+2 Sommerzeit)
  workflow_dispatch:       # Erlaubt manuelles Starten per Knopfdruck

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install requests google-genai edge-tts

      - name: Episoden generieren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          KONTAKT_EMAIL: ${{ secrets.KONTAKT_EMAIL }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/podcast-empfehlungen
        run: python generate.py

      - name: Aenderungen speichern
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -A
          git commit -m "Episoden vom $(date '+%d.%m.%Y')" || echo "Keine Aenderungen"
          git push
